          - heading "Markdown, MDX, code highlighting" [level=3] [ref=f5e86]
          - paragraph [ref=f5e87]: GFM tables, raw HTML, and syntax-highlighted code with one-click copy — all through react-markdown + remark-gfm + rehype-highlight + rehype-raw.
