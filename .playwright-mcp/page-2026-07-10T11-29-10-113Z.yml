          - paragraph [ref=f5e51]: Drop in <ChatPanel /> for an instant UI, compose <ChatProvider /> + <MessageList /> + <ChatComposer /> for a custom layout, or use the framework-agnostic ChatEngine class without React at all.
        - article [ref=f5e52]:
          - img [ref=f5e54]
          - heading "Any provider" [level=3] [ref=f5e56]
          - paragraph [ref=f5e57]: Native adapters for Anthropic and OpenAI, plus a generic OpenAI-compatible mode for OpenRouter, MiniMax, Together, Groq, vLLM, Ollama…
        - article [ref=f5e58]:
