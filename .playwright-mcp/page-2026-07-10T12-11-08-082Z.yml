          - heading "Built on shadcn/ui + Radix" [level=3] [ref=f7e66]
          - paragraph [ref=f7e67]: Looks and feels like the rest of the shadcn ecosystem. Your Tailwind theme carries over automatically.
        - article [ref=f7e68]:
          - img [ref=f7e70]
          - heading "Tools / function calling" [level=3] [ref=f7e72]
          - paragraph [ref=f7e73]: Register named tools with JSON-Schema parameters and async handlers — the engine dispatches calls and feeds results back to the model.
        - article [ref=f7e74]:
          - img [ref=f7e76]
          - heading "Streaming, persistence, retries" [level=3] [ref=f7e78]
          - paragraph [ref=f7e79]: Incremental SSE streaming, automatic retry with exponential back-off for 429/5xx, opt-in localStorage persistence keyed by persistKey.
