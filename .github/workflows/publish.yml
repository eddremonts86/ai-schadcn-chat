name: Publish to npm

# Publishes the package to npm when a GitHub Release is published, or on a
# manual dispatch. The release tag (e.g. v0.2.0) must match the version in
# package.json — the workflow verifies this before publishing so a mistagged
# release fails fast instead of shipping the wrong version.
#
# Requires the NPM_TOKEN repository secret (npm automation token with publish
# rights). Node 20 matches the Dockerfile build environment.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Verify tag matches package version
        if: github.event_name == 'release'
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME}"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "::error::Release tag $TAG does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - run: pnpm typecheck
      - run: pnpm test:unit
      - run: pnpm build

      - name: Publish
        run: pnpm publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
